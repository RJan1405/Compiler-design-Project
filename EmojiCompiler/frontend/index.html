<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Code Compiler | Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- TOP SECTION: Legend Bar -->
        <div class="legend-bar">
            <div class="ref-item"><span>🙂</span> START</div>
            <div class="ref-item"><span>🔚</span> END</div>
            <div class="ref-item"><span>🆕</span> VAR</div>
            <div class="ref-item"><span>📢</span> PRINT</div>
            <div class="ref-item"><span>➕</span> ADD</div>
            <div class="ref-item"><span>➖</span> SUB</div>
            <div class="ref-item"><span>✖</span> MUL</div>
            <div class="ref-item"><span>➗</span> DIV</div>
            <div class="ref-item"><span>❓</span> IF</div>
            <div class="ref-item"><span>🔁</span> ELSE</div>
            <div class="ref-item"><span>🔄</span> WHILE</div>
            <div class="ref-item"><span>➡</span> THEN</div>
        </div>

        <!-- MAIN SECTION -->
        <main class="compiler-layout">
            <div class="editor-column">
                <div class="column-header">main.emoji</div>
                <div class="editor-outer">
                    <div class="editor-gutter">1</div>
                    <textarea id="editor" spellcheck="false" placeholder="Start your code here..."></textarea>
                </div>
            </div>

            <div class="output-column">
                <div class="column-header">Compiler Output</div>
                <div class="output-group">
                    <label>GENERATED PYTHON</label>
                    <pre id="python-output" class="code-box"># Python code will appear here...</pre>
                </div>
                <div class="output-group">
                    <label>CONSOLE</label>
                    <div id="console-output" class="code-box">Ready for input...</div>
                </div>
            </div>
        </main>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <button onclick="compileCode()" class="btn-run">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                Compile & Run
            </button>
            <button onclick="clearEditor()" class="btn-tool">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                Clear
            </button>
            <button onclick="loadExample()" class="btn-tool">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                Load Example
            </button>
        </div>

        <!-- KEYBOARD -->
        <div class="emoji-keyboard">
            <button onclick="insertEmoji('🙂')"><span class="emoji">🙂</span><span class="label">START</span></button>
            <button onclick="insertEmoji('🔚')"><span class="emoji">🔚</span><span class="label">END</span></button>
            <button onclick="insertEmoji('🆕')"><span class="emoji">🆕</span><span class="label">VAR</span></button>
            <button onclick="insertEmoji('📢')"><span class="emoji">📢</span><span class="label">PRINT</span></button>
            <button onclick="insertEmoji('➕')"><span class="emoji">➕</span><span class="label">ADD</span></button>
            <button onclick="insertEmoji('➖')"><span class="emoji">➖</span><span class="label">SUB</span></button>
            <button onclick="insertEmoji('✖')"><span class="emoji">✖</span><span class="label">MUL</span></button>
            <button onclick="insertEmoji('➗')"><span class="emoji">➗</span><span class="label">DIV</span></button>
            <button onclick="insertEmoji('❓')"><span class="emoji">❓</span><span class="label">IF</span></button>
            <button onclick="insertEmoji('🔁')"><span class="emoji">🔁</span><span class="label">ELSE</span></button>
            <button onclick="insertEmoji('🔄')"><span class="emoji">🔄</span><span class="label">WHILE</span></button>
            <button onclick="insertEmoji('➡')"><span class="emoji">➡</span><span class="label">THEN</span></button>
        </div>

        <div id="error-panel" class="error-panel hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
